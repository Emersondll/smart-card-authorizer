# ======================================================
# Smart Card Authorizer — Application Configuration
# ======================================================
# All credentials MUST be provided via environment variables.
# Local defaults are provided only for development convenience.
# NEVER commit real credentials to version control.
# ======================================================

# ---- MongoDB ----
spring.data.mongodb.uri=${MONGO_URI:mongodb://localhost:27017/transactions}

# ---- RabbitMQ ----
spring.rabbitmq.addresses=${RABBITMQ_ADDRESSES:amqp://localhost:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:admin}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:admin}

# ---- Logging ----
logging.level.io.github.emersondll=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
